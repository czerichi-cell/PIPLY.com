{% extends "base.html" %}
{% block title %}Chyba {{ code }} – Piply{% endblock %}
{% block content %}
<div class="empty-state">
  <h1 style="font-size:40px">{{ code }}</h1>
  <p>{{ message }}</p>
  <a href="{{ url_for('social.feed') if current_user else url_for('auth.login') }}" class="btn" style="margin-top:10px">Zpět domů</a>
</div>
{% endblock %}
{% block auth_content %}
<div class="auth-card" style="text-align:center">
  <h1 style="font-size:32px">{{ code }}</h1>
  <p class="muted">{{ message }}</p>
  <a href="{{ url_for('auth.login') }}" class="btn" style="margin-top:10px">Zpět na přihlášení</a>
</div>
{% endblock %}
