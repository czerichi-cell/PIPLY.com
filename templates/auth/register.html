{% extends "base.html" %}
{% block title %}Registrace – Piply{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <img class="auth-logo" src="{{ url_for('static', filename='img/piply-white-transparent-cropped.png') }}" alt="Piply">
  <div class="auth-title">Založ si účet</div>
  <div class="auth-sub">Deník, statistiky a feed pro tebe a tvoje kamarády tradery</div>

  <form method="post">
    <div class="field">
      <label for="username">Uživatelské jméno</label>
      <input type="text" id="username" name="username" value="{{ form.get('username','') }}" autofocus required minlength="3">
    </div>
    <div class="field">
      <label for="display_name">Zobrazované jméno (volitelné)</label>
      <input type="text" id="display_name" name="display_name" value="{{ form.get('display_name','') }}" placeholder="Např. Petr K.">
    </div>
    <div class="field">
      <label for="email">E-mail (volitelné)</label>
      <input type="email" id="email" name="email" value="{{ form.get('email','') }}">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <div class="field">
        <label for="password2">Heslo znovu</label>
        <input type="password" id="password2" name="password2" required minlength="6">
      </div>
    </div>
    <button type="submit" class="btn btn-block">Vytvořit účet</button>
  </form>

  <div class="auth-foot">Už máš účet? <a href="{{ url_for('auth.login') }}">Přihlas se</a></div>
</div>
{% endblock %}
